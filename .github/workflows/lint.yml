name: Lint Markdown

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install markdownlint-cli
      run: npm install -g markdownlint-cli

    - name: Install custom rules
      run: |
        npm install markdownlint-rule-no-dead-urls

    - name: Run markdownlint
      run: |
        markdownlint "**/*.md" \
          --ignore node_modules \
          --ignore .git \
          --rules markdownlint-rules.json || true

    - name: Check required files
      run: |
        echo "=== Checking Required Files ==="
        required_files=(
          "brain/ACTIVATE.md"
          "brain/FOCUS.md"
          "brain/EPISODES.md"
          "brain/INTUITION.md"
          "brain/THINKKIT.md"
          "brain/META.md"
          "README.md"
          "LICENSE"
        )
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file"
          else
            echo "✗ $file MISSING"
            exit 1
          fi
        done
        echo "=== All required files present ==="

    - name: Check brain/ structure
      run: |
        echo "=== Brain Module Structure ==="
        echo "Core modules:"
        ls -la brain/*.md 2>/dev/null || echo "No files found"
        echo ""
        echo "Cases:"
        ls -la brain/cases/ 2>/dev/null || echo "No cases directory"
        echo ""
        echo "Total files in brain/: $(find brain -name "*.md" | wc -l)"

    - name: Validate YAML in markdown
      run: |
        echo "=== Checking YAML blocks ==="
        # Check for common YAML syntax issues in code blocks
        for file in $(find . -name "*.md" -type f); do
          if grep -q '^```yaml' "$file"; then
            echo "Checking YAML in: $file"
            # Extract yaml blocks and check basic syntax
            sed -n '/^```yaml/,/^```/p' "$file" | grep -v '^```' | head -20
          fi
        done

    - name: Link validation summary
      run: |
        echo "=== Link Check Summary ==="
        echo "For detailed link checking, use: npm run link-check"
        echo "Run locally: npx markdown-link-check .github/workflows/*.md README.md"
