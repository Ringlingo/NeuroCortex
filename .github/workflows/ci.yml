name: Lint Documents

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check file structure
      run: |
        echo "=== NeuroCortex File Structure ==="
        find . -type f -name "*.md" | head -20

    - name: Validate required files
      run: |
        echo "=== Validating Required Files ==="
        required_files=(
          "brain/ACTIVATE.md"
          "brain/FOCUS.md"
          "brain/EPISODES.md"
          "brain/INTUITION.md"
          "brain/THINKKIT.md"
          "brain/META.md"
          "README.md"
          "LICENSE"
        )
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file"
          else
            echo "✗ $file MISSING"
            exit 1
          fi
        done
        echo "=== All required files present ==="
